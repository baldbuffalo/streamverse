name: Build StreamVerse Android TV APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.3

      - name: Setup Node 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup Java 26
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 26

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Add Capacitor Android
        run: npx cap add android

      - name: Sync web build into Android
        run: npx cap sync android

      - name: Patch AndroidManifest for Android TV
        run: |
          python3 - <<'EOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              c = f.read()

          tv = '    <uses-feature android:name="android.software.leanback" android:required="true"/>\n    <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>\n'
          c = c.replace('<application', tv + '    <application', 1)

          c = c.replace(
              '<category android:name="android.intent.category.LAUNCHER" />',
              '<category android:name="android.intent.category.LAUNCHER" />\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />'
          )

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(c)
          print("✅ Manifest patched for Android TV")
          EOF

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: StreamVerse-AndroidTV
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
